<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7b5bd6">
<title>高中英語文法</title>
<link rel="manifest" href="manifest.json">
<!-- iOS (Safari) 加到主畫面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="高中英語文法">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
:root{--blue:#7b5bd6;--blue2:#a48ee6;--grad:linear-gradient(135deg,#7b5bd6,#9d86e6);--ok:#18a05a;--bad:#e2574c;--warn:#f5a623;--bg:#f1eefb;--card:#fff;--ink:#26224a;--soft:#efeafb;--muted:#6f6a86;--line:#ece8f8;--sh:0 10px 30px rgba(40,64,140,.08),0 2px 6px rgba(40,64,140,.04);--sh2:0 6px 18px rgba(40,64,140,.06),0 1px 2px rgba(40,64,140,.04);--r:22px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:3px solid #ffae33;outline-offset:2px;border-radius:8px}
body.big{zoom:1.18}
body{margin:0;font-family:"PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow-x:hidden}
.nm,.un,.us,.stem,.opt,.flash .w,.passage,.mt{overflow-wrap:anywhere}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));background:var(--grad);color:#fff;position:sticky;top:0;z-index:5;box-shadow:0 2px 12px rgba(60,90,180,.16)}
.topbar h1{font-size:18px;margin:0;flex:1;font-weight:800;letter-spacing:.2px}
.topbar .backbtn{background:rgba(255,255,255,.22);color:#fff;border:0;border-radius:11px;min-width:40px;height:34px;font-size:20px;font-weight:800;cursor:pointer;margin-right:8px}
.topbar .who{font-size:13px;font-weight:600;background:rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;cursor:pointer}
.wrap{flex:1;padding:16px;overflow:auto}
body.hasnav .wrap{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:560px;width:100%;display:none;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:12;box-shadow:0 -4px 18px rgba(60,90,160,.07);padding-bottom:env(safe-area-inset-bottom)}
body.hasnav .botnav{display:flex}
.botnav button{position:relative;flex:1;border:0;background:none;padding:9px 0 10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .15s}
.botnav button i{font-size:22px;font-style:normal;line-height:1;transition:transform .15s}
.botnav button span{font-size:11px;font-weight:700}
.botnav button.on{color:var(--blue)}
.botnav button.on i{transform:translateY(-1px) scale(1.12)}
.botnav button.on::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 4px 4px;background:var(--grad)}
.ring{width:76px;height:76px;border-radius:50%;background:conic-gradient(var(--rc,var(--blue)) calc(var(--p,0)*3.6deg), #e4ebfa 0);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}
.ring>span{width:58px;height:58px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--ink)}
.ring>span small{font-size:9px;font-weight:600;color:var(--muted)}
.skill{background:var(--card);border-radius:var(--r);padding:16px 8px;min-height:158px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh2);transition:transform .14s,box-shadow .14s}
.skill:active{transform:scale(.97)}
.skill .t{font-weight:800;margin-top:11px;font-size:14px}
.skill .s{font-size:11px;color:var(--muted);margin-top:3px}
.mrow{display:flex;align-items:center;gap:13px;padding:14px;background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.mrow:active{transform:scale(.99)}
.mrow .mi{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--soft)}
.mrow .mt{flex:1}.mrow .mt b{font-weight:800}.mrow .mt div{font-size:12px;color:var(--muted);margin-top:2px}
.unitcard{display:flex;align-items:center;gap:11px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:16px;margin:8px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.unitcard:active{transform:scale(.99)}
.unitcard .ub{flex:1;min-width:0}.unitcard .un{font-weight:700;font-size:15px}.unitcard .us{font-size:12px;color:var(--muted);margin-top:3px}
.unitcard .ub .bar{margin:6px 0 0!important;height:7px}
.unitcard .mi{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto}
.unitcard>div:last-child:not(.ub):not(.mi):not(.dot),.mrow>div:last-child:not(.mt):not(.mi),.row>div:last-child:not(.nm){color:#c3cddd;font-size:13px;font-weight:800;flex:0 0 auto}
.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,.03)}
.dot.new{background:#cdd6e6}.dot.ing{background:var(--blue)}.dot.done{background:var(--ok)}
.btn{display:block;width:100%;border:0;border-radius:16px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;background:var(--grad);color:#fff;margin:10px 0;box-shadow:0 6px 16px rgba(79,110,247,.28);transition:transform .12s,box-shadow .12s}
.btn:active{transform:translateY(1px) scale(.99);box-shadow:0 3px 10px rgba(79,110,247,.24)}
.btn.sec{background:var(--soft);color:var(--blue);box-shadow:none}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid #dde5f5;box-shadow:none}
.install-btn{display:flex;align-items:center;gap:8px;width:100%;border:0;border-radius:15px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer;background:#eafaf1;color:#128049;margin:0 0 12px;box-shadow:var(--sh2)}
.install-btn.sec{background:var(--soft);color:var(--blue)}
.install-tip{background:#fff7e6;border:1px solid #ffe0a3;border-radius:15px;padding:14px;font-size:14px;line-height:1.9;margin:0 0 12px}
.install-tip .install-x{display:inline-block;margin-top:8px;color:var(--blue);font-weight:800;cursor:pointer}
.btn[disabled]{opacity:.5;box-shadow:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--card);border-radius:var(--r);padding:18px;min-height:158px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh2);transition:transform .14s}
.tile:active{transform:scale(.98)}
.tile .ico{font-size:34px}.tile .t{font-weight:800;margin-top:10px}.tile .s{font-size:12px;color:var(--muted);margin-top:4px}
.card{background:var(--card);border-radius:var(--r);padding:17px;margin:12px 0;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh)}
.h2{font-size:16px;font-weight:800;margin:16px 2px 10px}
.passage{background:var(--soft);border-radius:14px;padding:14px;font-size:15px;line-height:1.8;white-space:pre-wrap;margin-bottom:6px}
.passage .wd{cursor:pointer;border-bottom:1px dotted #a9bbe4}
.passage .wd.got{border-bottom:2px solid #1e8e4e;color:#1e8e4e;font-weight:600}
.passage .wd:active{background:#fff2cc}
.wdhint{font-size:12px;color:var(--muted);margin:0 2px 12px}
.stem{font-size:18px;font-weight:700;line-height:1.6;margin:6px 0 14px}
.opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid #e3e9f6;border-radius:15px;padding:14px;margin:10px 0;font-size:16px;cursor:pointer;box-shadow:var(--sh2);transition:transform .1s,border-color .1s}
.opt:active{transform:scale(.99)}
.opt .lab{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;text-align:center;background:var(--soft);color:var(--blue);border-radius:50%;font-weight:800;margin-right:11px;vertical-align:middle}
.opt.ok{border-color:var(--ok);background:#e9faf1}.opt.ok .lab{background:var(--ok);color:#fff}
.opt.bad{border-color:var(--bad);background:#fdeeec}.opt.bad .lab{background:var(--bad);color:#fff}
.opt[disabled]{cursor:default;opacity:.96}
.expl{background:#fff7e6;border:1px solid #ffe0a3;border-radius:15px;padding:13px;margin-top:12px;font-size:14px;line-height:1.6}
.bar{height:9px;background:#e4ebfa;border-radius:9px;overflow:hidden;margin:2px 0 14px}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:9px;transition:width .4s ease}
.row{display:flex;align-items:center;gap:10px;padding:13px;background:#fff;border:1px solid var(--line);border-radius:15px;margin:9px 0;box-shadow:var(--sh2)}
.row .nm{flex:1;font-weight:700}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--soft);color:var(--blue);font-weight:700}
.pill.d1{background:#e7f8ee;color:#158048}.pill.d2{background:#fff2df;color:#9a6200}.pill.d3{background:#fdeae7;color:#c73a2b}
.profile{display:flex;align-items:center;gap:14px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.profile:active{transform:scale(.99)}
.ava{width:48px;height:48px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:inset 0 0 0 1px rgba(79,110,247,.08)}
.muted{color:var(--muted);font-size:13px}
.center{text-align:center;padding:34px 10px}
.fab{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);max-width:528px;width:calc(100% - 32px)}
input,select{font-size:16px;padding:12px;border:1px solid #dde5f5;border-radius:12px;width:100%;font-family:inherit}
.tag{font-size:12px;color:var(--muted)}
.statbig{font-size:32px;font-weight:800;color:var(--blue);letter-spacing:.5px}
.flash{min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;background:linear-gradient(160deg,#fff,#f5f8ff);border:1px solid #dfe7fb;box-shadow:0 10px 26px rgba(40,64,140,.10);padding:24px}
.flash .w{font-size:40px;font-weight:800;letter-spacing:.5px}.flash .p{color:var(--muted);margin-top:8px}.flash .z{font-size:26px;margin-top:16px;color:var(--blue);font-weight:700}
.seg{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.seg button{flex:1;min-width:70px;padding:11px;border-radius:13px;border:1px solid #dde5f5;background:#fff;font-weight:700;cursor:pointer;transition:transform .1s}
.seg button:active{transform:scale(.97)}
.seg button.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(79,110,247,.24)}
.gradeRow{display:flex;gap:10px;margin-top:10px}
.gradeRow button{flex:1;padding:15px;border-radius:15px;border:0;font-weight:800;font-size:15px;color:#fff;cursor:pointer;box-shadow:var(--sh2);transition:transform .1s}
.gradeRow button:active{transform:scale(.97)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><button class="backbtn" id="backbtn" onclick="goBack()" aria-label="上一頁" style="display:none">←</button><h1 id="title">高中英語文法</h1><span class="who" id="who" onclick="go('home')"></span></div>
  <div class="wrap" id="view"></div>
  <div class="botnav" id="botnav">
    <button data-nav="home" onclick="go('home')"><i>🏠</i><span>首頁</span></button>
    <button data-nav="review" onclick="go('review')"><i>📚</i><span>複習</span></button>
    <button data-nav="stats" onclick="go('stats')"><i>📊</i><span>統計</span></button>
    <button data-nav="mine" onclick="go('mine')"><i>👤</i><span>我的</span></button>
  </div>
</div>
<script>
/*__DATA__*/
// ---------- 工具 ----------
const $=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild};
const view=document.getElementById('view'), who=document.getElementById('who'), title=document.getElementById('title'), botnav=document.getElementById('botnav');
const today=()=>Math.floor(Date.now()/86400000);
function speak(t){try{if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function enOf(s){return String(s||'').replace(/[一-鿿　-〿＿_]/g,' ').replace(/\s+/g,' ').trim();}
function hashPin(s){let h=5381;for(let i=0;i<s.length;i++)h=((h*33)^s.charCodeAt(i))>>>0;return 'h'+h.toString(36);}
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byId={}; DATA.questions.forEach(q=>byId[q.id]=q); DATA.vocab.forEach(v=>byId[v.id]=v);
const passById={}; DATA.passages.forEach(p=>passById[p.passageId]=p);
const vByWord={}; DATA.vocab.forEach(v=>{vByWord[v.word.toLowerCase()]=v;});
const NOTES=DATA.notes||{};
function toast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#23304d;color:#fff;padding:11px 18px;border-radius:22px;z-index:30;font-size:14px;max-width:88%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.25)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1700);}
const STOPW=new Set('the and are was were you your yours his her hers its our their they them these those this that there here what which who whom how when where why not but for nor yet with from into out off over about after before all any some more most very too also then than have has had will would can could may might shall should must does did being been because while into upon each other'.split(' '));
function tapWords(t){const mv=P().myVocab||{};return esc(t).replace(/[A-Za-z]{3,}/g,w=>`<span class="wd${mv[w.toLowerCase()]?' got':''}">${w}</span>`);}
function collectWord(w){const orig=w;w=w.toLowerCase();if(STOPW.has(w)){toast('「'+w+'」是常用字，不用特別背');return}const v0=vByWord[w]||vByWord[w.replace(/s$/,'')]||vByWord[w.replace(/es$/,'')];if(!v0&&/^[A-Z][a-z]/.test(orig)){toast('「'+orig+'」看起來像名字或專有名詞，先略過');return}const d=P();d.myVocab=d.myVocab||{};if(d.myVocab[w]){toast('「'+w+'」已在我的單字');return}const v=v0;d.myVocab[w]={word:v?v.word:w,zh:v?v.zh:'(查字典)'};savP(d);toast('⭐ 已加入我的單字：'+w+(v?'　'+v.zh:''));}
function myVocabList(){const mv=P().myVocab||{};return Object.keys(mv).map(k=>{const m=mv[k],id='MY-'+k;const o=byId[id]||{id,type:'vocab',word:m.word,zh:m.zh,pos:'',example:'',exampleZh:'',unit:'我的單字',difficulty:1,difficultyScore:0.3};o.zh=m.zh;byId[id]=o;return o;});}
function removeMyWord(w){const d=P();if(d.myVocab)delete d.myVocab[w.toLowerCase()];savP(d);toast('已移除 '+w);startVocab('__MY__');}
function editMyWord(w){const cur=(P().myVocab||{})[w.toLowerCase()];const zh=prompt('「'+w+'」的中文意思？',cur&&cur.zh!=='(查字典)'?cur.zh:'');if(zh==null)return;const d=P();d.myVocab=d.myVocab||{};d.myVocab[w.toLowerCase()]={word:w,zh:(zh.trim()||'(查字典)')};savP(d);startVocab('__MY__');}
const READING_INTRO='閱讀小技巧：先看題目問什麼，再回文章找答案，不用每個字都懂！';
const READING_TIPS={
 '書信':'先看開頭稱呼(Dear…)和結尾(Best/Love)判斷誰寫給誰；信的「目的」常在開頭或結尾。',
 '海報通知':'先抓 5W：活動名稱、時間(Time)、地點(Place)、對象、費用；題目常問時間地點或誰適合。',
 '對話':'注意「誰」在說、彼此關係與語氣；答案常藏在某一句回應裡。',
 '圖表':'先看標題與欄位/座標，弄懂圖在比什麼；題目多問最高/最低或比較。',
 '文章':'先看第一句和最後一句抓主旨；生字用上下文猜，再回對應段落找答案。',
};
let teacherUnlocked=false;
const AVATARS=['🦊','🐯','🐼','🐶','🐱','🐵','🦁','🐰','🐸','🐧','🦄','🐨'];

// ---------- 身分/儲存 ----------
const LS=localStorage;
function profiles(){try{return JSON.parse(LS.getItem('enghs.profiles')||'[]')}catch{return[]}}
function saveProfiles(p){LS.setItem('enghs.profiles',JSON.stringify(p))}
function curId(){return LS.getItem('enghs.current')}
function setCur(id){LS.setItem('enghs.current',id)}
function curProfile(){return profiles().find(p=>p.id===curId())}
function prog(id){try{return JSON.parse(LS.getItem('enghs.prog.'+id)||'{}')}catch{return{}}}
function saveProg(id,d){LS.setItem('enghs.prog.'+id,JSON.stringify(d))}
function P(){const id=curId();const d=prog(id);d.srs=d.srs||{};d.wrong=d.wrong||[];d.log=d.log||[];return d}
function savP(d){const id=curId();if(!id)return;saveProg(id,d)}

// ---------- SRS (SM-2 lite) ----------
function sched(card,grade){ // grade: 'again'|'good'|'easy'
  card.ease=card.ease||2.4; card.reps=card.reps||0; card.lapses=card.lapses||0;
  if(grade==='again'){card.lapses++;card.reps=0;card.ease=Math.max(1.3,card.ease-0.2);card.interval=0;}
  else{ if(card.reps===0)card.interval=(grade==='easy'?2:1);
        else if(card.reps===1)card.interval=(grade==='easy'?5:3);
        else card.interval=Math.round(card.interval*card.ease*(grade==='easy'?1.25:1));
        card.reps++; if(grade==='easy')card.ease+=0.1; }
  card.due=today()+card.interval; card.last=today(); return card;
}

// ---------- 導覽 ----------
let session=null;
function saveSession(){const d=P();d.session=session?{type:session.type,opt:session.opt,ids:session.queue.map(q=>q.id),i:session.i,right:session.right,wrongMode:!!session.wrongMode}:null;savP(d);}
function clearSession(){const d=P();d.session=null;savP(d);session=null;}
function resumeSession(){const s=P().session;if(!s||!s.ids){return go('home')}session={type:s.type,opt:s.opt,queue:s.ids.map(id=>byId[id]).filter(Boolean),i:s.i,right:s.right,wrongMode:s.wrongMode};go('quiz');}
let navStack=[], curNav={s:null,arg:undefined};
function go(s,arg){ if(curNav.s && curNav.s!==s){navStack.push(curNav); if(navStack.length>40)navStack.shift();} curNav={s,arg}; render(s,arg); window.scrollTo(0,0); }
function goBack(){ const prev=navStack.pop(); if(prev){curNav=prev;render(prev.s,prev.arg);} else {curNav={s:'home'};render('home');} window.scrollTo(0,0); }
function scConsent(){
  who.style.display='none'; const bb=document.getElementById('backbtn'); if(bb)bb.style.display='none'; title.textContent='使用前說明';
  view.innerHTML=`<div class="card" style="line-height:1.9;font-size:15px"><div class="h2">📖 歡迎使用高中英語文法</div>本 App 的題目、閱讀短文與解析皆為 <b>AI 全新原創</b>，依高中課綱與學測範圍編寫，非任何出版社教材，可自由使用。<br><br>單字為大考中心高中 6000 字表，例句由 AI 撰寫。內容僅供學習參考。<br><br>學習進度只存在<b>這台裝置的瀏覽器</b>，不會上傳任何資料。</div>`;
  const b=$('<button class="btn">我了解，開始使用 ▶</button>'); b.onclick=()=>{LS.setItem('enghs.consent','1');go('profiles')}; view.appendChild(b);
}
function render(s,arg){
  if(!LS.getItem('enghs.consent') && !profiles().length && s!=='consent') return scConsent();
  who.style.display = (s==='profiles')?'none':'inline-block';
  const bb=document.getElementById('backbtn'); if(bb)bb.style.display=(navStack.length && !['profiles','consent','home','newprofile','review','mine'].includes(s))?'inline-block':'none';
  const navTab={home:'home',review:'review',units:'review',vocabsub:'review',stats:'stats',mine:'mine',wrong:'mine'}[s];
  document.body.classList.toggle('hasnav',!!navTab);
  if(navTab)[...botnav.children].forEach(b=>b.classList.toggle('on',b.dataset.nav===navTab));
  const c=curProfile(); who.textContent=c?(c.emoji+' '+c.name):'';

// ---------- 出題：選單元→由易到難→間隔複習 ----------
function buildQueue(type,opt){
  opt=opt||{};
  let items;
  if(type==='grammar'){if(!opt.unit)return[];items=DATA.questions.filter(q=>q.type==='grammar'&&q.unit===opt.unit&&readable(q)&&(!gDiff||q.difficulty==gDiff));}
  else if(type==='reading')items=readingPool();
  else{const hasSub=(opt.sub!==undefined&&opt.sub!==''&&opt.sub!==null);items=opt.topic==='__MY__'?myVocabList():(hasSub?(themeChunks(opt.topic)[+opt.sub]||[]):DATA.vocab.filter(v=>(!opt.topic||v.unit===opt.topic)&&(!opt.level||v.level===opt.level)));}
  const d=P();
  items.sort((a,b)=>(a.difficultyScore||a.difficulty||0)-(b.difficultyScore||b.difficulty||0));
  const due=[],fresh=[];
  items.forEach(q=>{const s=d.srs[q.id]; if(!s)fresh.push(q); else if(s.due<=today())due.push(q);});
  due.sort((a,b)=>(d.srs[a.id].due)-(d.srs[b.id].due));
  // 一輪：到期的全收 + 8 新題(難度分層:約★1×4 ★2×2 ★3×2,且由易到難排好)
  return due.concat(pickFresh(fresh,8)).slice(0,15);
}
function pickFresh(fresh,n){
  const t={1:[],2:[],3:[]}; fresh.forEach(q=>{(t[q.difficulty]||t[2]).push(q)});
  const want={1:Math.ceil(n*0.5),2:Math.round(n*0.25)}; want[3]=n-want[1]-want[2];
  let out=[]; [1,2,3].forEach(k=>out=out.concat(t[k].slice(0,want[k])));
  if(out.length<n){const used=new Set(out);out=out.concat(fresh.filter(q=>!used.has(q)).slice(0,n-out.length));}
  return out.sort((a,b)=>(a.difficultyScore||0)-(b.difficultyScore||0));
}
function start(type,opt){

}

function answer(q,choice,box){

    let enc;

  view.appendChild($('<div class="card">'+h+'</div>'));
  // 單字各主題(已背)
  const byV={};DATA.vocab.forEach(v=>{const sr=d.srs[v.id];if(!sr)return;const u=v.unit;byV[u]=byV[u]||{t:0,m:0};byV[u].t++;if(sr.interval>=3)byV[u].m++;});
  const ent=Object.entries(byV);
  if(ent.length){let hv='<div class="h2">單字各主題（已背過的）</div>';ent.forEach(([u,o])=>{const pct=o.t?Math.round(o.m/o.t*100):0;hv+=`<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${u}</span><span class="muted">記熟 ${o.m}/${o.t}</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>`});view.appendChild($('<div class="card">'+hv+'</div>'));}
  view.appendChild($(`<div class="muted" style="margin:6px 2px">「已熟練/記熟」= 連續答對、隔幾天再對的題；剛練完當天通常還少，多複習幾天會增加。</div>`));
}

<script>
(function(){
  function mount(){
    var f=document.getElementById('rdgFoot'); if(!f) return;
    // 找最合適的捲動容器：優先文件流的 #app，其次頁面最大的內部捲動區，最後 body
    var app=document.getElementById('app');
    var target=null;
    if(app){ var s=getComputedStyle(app); if(s.overflowY==='visible'||s.overflowY==='') target=app; }
    if(!target){
      var best=null,area=0,els=document.body.getElementsByTagName('*');
      for(var i=0;i<els.length;i++){ var el=els[i];
        if(el===f||el.contains(f)) continue;
        var st=getComputedStyle(el);
        if(st.overflowY==='auto'||st.overflowY==='scroll'){
          var r=el.getBoundingClientRect();
          if(r.height>200&&r.width>140&&r.top<innerHeight&&r.bottom>0){
            var a=r.width*r.height; if(a>area){area=a;best=el;}
          }
        }
      }
      target=best||app||document.body;
    }
    try{ target.appendChild(f); }catch(e){ document.body.appendChild(f); }
    f.style.display='block';
  }
  if(document.readyState==='complete') setTimeout(mount,300);
  else window.addEventListener('load',function(){setTimeout(mount,300);});
})();

<script>/*ENG_SYNC_MODULE_V2*/
window.__ENG_APP="hs-grammar";window.__ENG_LABEL="高中英語文法";
window.__ENG_SUMMARY=function(){
  var id=''; try{ id=localStorage.getItem('%NS%.current')||''; }catch(e){}
  var d={}; try{ d=JSON.parse(localStorage.getItem('%NS%.prog.'+id)||'{}'); }catch(e){}
  var srs=d.srs||{}, log=d.log||[];
  var mastered=Object.keys(srs).filter(function(k){return srs[k]&&srs[k].interval>=3}).length;
  var ok=log.filter(function(x){return x&&x.correct}).length;
  var pct=log.length?Math.round(ok/log.length*100):null, plabel='作答正確率';
  var lead={k:'作答',v:log.length}, ansChip=[];
  // 連續天數：直接由 log 時間戳推算，不依賴 App 內部函式(17 的函式包在 IIFE 內取不到)
  var days={};
  log.forEach(function(x){ if(x&&x.ts){ var t2=new Date(x.ts); days[t2.getFullYear()+'-'+t2.getMonth()+'-'+t2.getDate()]=1; } });
  var sk=0, cur=new Date();
  for(var i=0;i<400;i++){
    var kk=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
    if(days[kk]){ sk++; cur.setDate(cur.getDate()-1); } else break;
  }
  return {pct: pct, pctLabel: plabel, streak: sk,
    metrics:[lead,{k:'精熟',v:mastered},{k:'待清錯題',v:(d.wrong||[]).length}].concat(ansChip)};
};
(function(){
  var APP=window.__ENG_APP||'app', LABEL=window.__ENG_LABEL||document.title;
  var K={url:'eng_sync_url',key:'eng_sync_key',child:'eng_child'};
  function G(k){ try{return localStorage.getItem(k)||''}catch(e){return ''} }
  function cfg(){ return {url:G(K.url), key:G(K.key), child:G(K.child)}; }
  function ready(){ var c=cfg(); return !!(c.url&&c.child); }
  try{
    var m=(location.hash||'').match(/sync=(.+)$/);
    if(m){
      var p=m[1].split('~').map(function(s){try{return decodeURIComponent(s)}catch(e){return s}});
      if(p[0]) localStorage.setItem(K.url,p[0].replace(/\/+$/,''));
      if(p[1]) localStorage.setItem(K.key,p[1]);
      if(p[2]) localStorage.setItem(K.child,p[2]);
      try{history.replaceState(null,'',location.pathname+location.search)}catch(e){}
      setTimeout(function(){ alert('✅ 家長後台已設定：這台是「'+(p[2]||'')+'」的裝置，之後所有英語 App 都會自動回報進度。'); },300);
    }
  }catch(e){}
  function report(){ try{ return window.__ENG_SUMMARY()||{}; }catch(e){ return {}; } }
  var t=null;
  function push(beacon){
    var c=cfg(); if(!c.url||!c.child) return;
    var r=report();
    var body=JSON.stringify({child:c.child, app:APP, label:LABEL, key:c.key, ts:Date.now(),
      pct:(r.pct===undefined?null:r.pct), pctLabel:r.pctLabel||'進度',
      streak:(r.streak===undefined?null:r.streak), metrics:r.metrics||[]});
    var url=c.url+'/report';
    try{
      if(beacon && navigator.sendBeacon){ navigator.sendBeacon(url, new Blob([body],{type:'text/plain'})); return; }
      fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:body,keepalive:true})
        .then(function(){setDot(true)}).catch(function(){setDot(false)});
    }catch(e){}
  }
  function schedule(){ if(!ready()) return; if(t) clearTimeout(t); t=setTimeout(function(){push(false)},6000); }
  try{
    var _si=Storage.prototype.setItem;
    Storage.prototype.setItem=function(k,v){
      var r=_si.apply(this,arguments);
      try{ var s=String(k); if(s!=='eng_sync_url'&&s!=='eng_sync_key'&&s!=='eng_child') schedule(); }catch(e){}
      return r;
    };
  }catch(e){}
  window.addEventListener('pagehide',function(){ if(ready()) push(true); });
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden'&&ready()) push(true); });
  function setDot(ok){ var d=document.getElementById('engSyncDot'); if(d) d.style.background=ok?'#2eb872':'#e8504f'; }
  window.engSyncNow=function(){ push(false); };
  window.engSync={push:push,cfg:cfg,report:report};
  setTimeout(function(){
    if(!ready()) return;
    if(document.getElementById('engSyncBadge')) return;
    var c=cfg();
    var b=document.createElement('div'); b.id='engSyncBadge';
    b.style.cssText='position:fixed;left:8px;bottom:calc(var(--nav-h,60px) + env(safe-area-inset-bottom) + 8px);z-index:60;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:5px;cursor:pointer';
    b.innerHTML='<span id="engSyncDot" style="width:8px;height:8px;border-radius:50%;background:#2eb872;display:inline-block"></span>☁️ '+c.child;
    b.title='點我立即同步'; b.onclick=function(){ engSyncNow(); };
    document.body.appendChild(b);
    push(false);
  }, 900);
})();
</script>
